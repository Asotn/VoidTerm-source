name: Build VoidTerm APK

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: voidterm-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: voidterm-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## VoidTerm ${{ github.ref_name }}

            ### Install
            Download the APK below and install it on your Android device.
            Enable "Install from unknown sources" in Settings if prompted.

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for details.

            **Developer:** Asotn | github.com/Asotn | s.pi@outlook.sa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
